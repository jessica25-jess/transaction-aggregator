version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: transactions-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Jess25
      POSTGRES_DB: transactions
    ports:
        - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  app:
   build: .
   container_name: transaction-app
   ports:
    - "8080:8080"
   depends_on:
    postgres:
      condition: service_healthy

